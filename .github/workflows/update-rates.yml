name: Update Currency Rates

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and save exchange rates
        env:
          API_KEY: ${{ secrets.EXCHANGERATE_API_KEY }}
        run: |
          mkdir -p currency
          python3 - <<'EOF'
          import urllib.request, json, datetime, os

          api_key = os.environ["API_KEY"]
          url = f"https://v6.exchangerate-api.com/v6/{api_key}/latest/USD"

          with urllib.request.urlopen(url) as response:
              data = json.loads(response.read())

          if data.get("result") != "success":
              raise Exception(f"API error: {data}")

          output = {
              "base": "USD",
              "timestamp": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "rates": data["conversion_rates"]
          }

          with open("currency/rates.json", "w") as f:
              json.dump(output, f, indent=2)

          print(f"Success: {len(output['rates'])} currencies saved")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add currency/rates.json
          git diff --staged --quiet || git commit -m "Update currency rates $(date -u +%Y-%m-%d)"
          git push
